<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leafGrad" x1="45" y1="20" x2="135" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" /> <!-- emerald-400 -->
      <stop offset="50%" stop-color="#10b981" /> <!-- emerald-500 -->
      <stop offset="100%" stop-color="#059669" /> <!-- emerald-600 -->
    </linearGradient>
    <linearGradient id="stemGrad" x1="90" y1="20" x2="90" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a7f3d0" /> <!-- emerald-200 -->
      <stop offset="100%" stop-color="#064e3b" /> <!-- emerald-900 -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#064e3b" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Sleek, organic curved leaf shape -->
    <!-- Right side of leaf -->
    <path d="M90 20 C140 50 160 100 135 145 C115 160 100 162 90 165 Z" fill="url(#leafGrad)" />
    <!-- Left side of leaf (slightly darker overlay for shading/depth) -->
    <path d="M90 20 C40 50 20 100 45 145 C65 160 80 162 90 165 Z" fill="url(#leafGrad)" />
    <!-- Dark overlay for left side to give 3D depth -->
    <path d="M90 20 C40 50 20 100 45 145 C65 160 80 162 90 165 Z" fill="#047857" opacity="0.2" />

    <!-- Stem / Central Vein -->
    <path d="M90 20 Q90 95 90 165" stroke="url(#stemGrad)" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Left side veins -->
    <path d="M90 55 Q72 50 60 44" stroke="#a7f3d0" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
    <path d="M90 80 Q67 75 52 66" stroke="#a7f3d0" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
    <path d="M90 105 Q67 100 54 88" stroke="#a7f3d0" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
    <path d="M90 130 Q72 124 62 112" stroke="#a7f3d0" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />

    <!-- Right side veins -->
    <path d="M90 55 Q108 50 120 44" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.3" />
    <path d="M90 80 Q113 75 128 66" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.3" />
    <path d="M90 105 Q113 100 126 88" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.3" />
    <path d="M90 130 Q108 124 118 112" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.3" />
  </g>
</svg>